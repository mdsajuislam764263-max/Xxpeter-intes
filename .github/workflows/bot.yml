name: Safe Bot

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install
        run: npm install

      - name: Start Bot
        run: node index.js
        env:
          TOKEN: ${{ secrets.TOKEN }}
          PREFIX: ${{ secrets.PREFIX }}
