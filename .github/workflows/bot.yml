name: Stable Bot Runner

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install Packages
        run: npm install

      - name: Start Bot (Auto Restart Safe Mode)
        run: |
          node index.js &
          PID=$!
          echo "Bot started with PID $PID"
          wait $PID
        env:
          TOKEN: ${{ secrets.TOKEN }}
          PREFIX: ${{ secrets.PREFIX }}

      - name: Upload Logs (if crash)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: .
