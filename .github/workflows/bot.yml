name: Bot Runner 24/7 (Limited)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # প্রতি 30 মিনিটে trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # max 6 hours

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm install

    - name: Run Bot (auto restart loop)
      run: |
        while true; do
          echo "Starting bot..."
          node index.js
          echo "Bot crashed! Restarting in 5s..."
          sleep 5
        done
