name: 🤖 Run Messenger Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v3

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: 📦 Install Dependencies
      run: |
        npm install
        npm install dotenv

    - name: 🚀 Start Bot (Auto Restart Loop)
      run: |
        echo "🔥 Bot Starting..."
        for i in {1..100}
        do
          echo "🔁 Restart #$i"
          npm start
          echo "❌ Crashed! Restarting in 5s..."
          sleep 5
        done
