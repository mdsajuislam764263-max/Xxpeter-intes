name: Auto Restart Bot

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  bot-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Start Bot with Auto Restart Loop
        run: |
          echo "🚀 Starting bot loop..."
          while true; do
            node index.js
            EXIT_CODE=$?
            echo "Bot stopped with code $EXIT_CODE"

            if [ $EXIT_CODE -eq 0 ]; then
              echo "Normal exit, stopping workflow."
              break
            else
              echo "Crash detected, restarting in 5s..."
              sleep 5
            fi
          done
        env:
          TOKEN: ${{ secrets.TOKEN }}
          PREFIX: ${{ secrets.PREFIX }}

      - name: Upload Logs (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: .
